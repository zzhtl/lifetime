  "遇到情绪上头时先暂停、慢呼吸，再决定言行",
  "把修炼目标写小：先做人稳当，再谈进阶",
]
benefit = "为后续静功打好心性与生活基础，避免急于求成"
science = "先建立稳定的作息、情绪调节和现实功能，比追求高阶体验更利于长期坚持与安全。"
