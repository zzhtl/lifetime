[[practice]]
category = "xian_cultivation"
title = "先天一炁：匀息养元"
stage = "foundation"
duration_mins = 8
frequency = "每日"
scenes = ["home", "office"]
summary = "丹经所谓先天一炁，日用只取匀细呼吸、养住元气，不搬运、不闭气。"
steps = [
  "坐稳肩颈放松，先自然呼吸 1 分钟",
  "让呼吸慢慢变细、变匀，吸气自然、呼气略长",
  "注意力轻放在下腹起伏，不刻意鼓劲",
  "12-20 轮后回到自然呼吸，起身活动",
]
benefit = "以匀细呼吸收敛心神，作为温和的养气日课"
science = "缓慢均匀的呼吸有助于放松反应和情绪稳定，重点在自然而非强控。"
caution = "严禁长时间闭气、憋气或追求缺氧感；头晕、胸闷立即恢复自然呼吸。"
sources = [
