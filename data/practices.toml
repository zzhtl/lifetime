benefit = "降低换季时的外感与疲劳风险"
science = "季节交替与呼吸道疾病高发相关，作息、营养和基础防护是可控的保护因素。"
caution = "持续发热、呼吸困难或症状加重不要硬扛，及时就医。"
sources = [
  { name = "黄帝内经·素问·四气调神大论", url = "https://ctext.org/huangdi-neijing/si-qi-diao-shen-da-lun/zhs", level = "classic" },
  { name = "CDC Chronic Disease Prevention", url = "https://www.cdc.gov/chronic-disease/prevention/index.html", level = "government" },
