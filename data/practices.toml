  "把重要练功和用脑安排在精力最好的时段",
  "困倦、生病、过劳时顺势减量，不逆势硬撑",
  "每周复盘一次：作息、精力、情绪是否顺畅",
]
benefit = "顺应节律安排饮食、作息与练功，减少逆势消耗"
science = "顺应昼夜节律安排进食与活动，有助于代谢、睡眠和精力的稳定。"
