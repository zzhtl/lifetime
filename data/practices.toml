[[practice]]
category = "mind_breath"
title = "观息自然：不调而调"
stage = "entry"
duration_mins = 8
frequency = "每日"
scenes = ["home", "office", "bedtime"]
summary = "不刻意控制呼吸，只是观察它，久之自然变匀。"
steps = [
  "坐稳或躺平，肩颈放松，双眼微闭",
  "把注意力放在鼻端或腹部起伏，只观察不改造",
  "走神了不自责，温和把注意力带回呼吸",
  "从 8 分钟开始，结束后缓慢睁眼、动一动身体",
]
benefit = "训练注意力稳定，降低紧张，适合日常与睡前"
science = "呼吸觉察是正念的基础形式，有助于注意力调节和放松，不需要刻意改变呼吸。"
caution = "若觉察呼吸引发紧张或过度关注，改为睁眼、听环境声等更中性的锚点。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "mind_breath"
title = "慈心念己：善意养和"
stage = "foundation"
duration_mins = 10
frequency = "每周 3-5 次"
scenes = ["home", "bedtime"]
summary = "先善待自己，再把善意推及他人，柔化紧绷的心。"
steps = [
  "坐稳做几次慢呼吸，让身体先安定",
  "心中默念对自己的祝愿，如愿我平安、愿我放松",
  "再把祝愿推及亲近的人、普通的人",
  "情绪起伏时不评判，回到默念的语句",
]
benefit = "培养自我关怀，缓解自责与紧张情绪"
science = "慈心冥想属于有研究支持的心理练习，有助于提升积极情绪和自我关怀。"
caution = "若默念引发强烈自责或悲伤，减短时间或改做中性的呼吸觉察；情绪困扰持续应求助。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "mind_breath"
title = "转念释忧：书写解结"
stage = "entry"
duration_mins = 10
frequency = "情绪淤堵时"
scenes = ["home", "office"]
summary = "念头堵住时，把它写下来、看清楚，比在脑中反刍更松。"
steps = [
  "拿纸笔，把此刻最扰心的事如实写下",
  "分开写：哪些是事实，哪些是我的想象与担心",
  "针对可控部分，写一个最小的下一步",
  "写完合上本子，允许暂时把它放下",
]
benefit = "减少反刍思维，把内耗转成可执行的一步"
science = "表达性书写和认知重构有助于降低反刍，缓解焦虑情绪。"
caution = "若书写越写越陷入痛苦或出现自伤念头，请停止并寻求专业帮助。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "Harvard Health Relaxation Techniques", url = "https://www.health.harvard.edu/mind-and-mood/six-relaxation-techniques-to-reduce-stress", level = "medical_center" },
]

[[practice]]
category = "xian_cultivation"
title = "清静遣欲：澄心止念"
stage = "foundation"
duration_mins = 10
frequency = "每日"
scenes = ["home", "bedtime"]
summary = "依《清静经》遣欲澄心之意，练放下多余念头，不与念头较劲。"
steps = [
  "坐稳先守息 3 分钟，让呼吸自然放慢",
  "念头来时，不追随也不压制，只看着它起落",
  "把注意力轻轻放回呼吸，像水面渐渐澄清",
  "结束写一句：今天最常出现的念头是什么",
]
benefit = "训练与念头保持距离，减少被欲望和杂念牵走"
science = "遣欲澄心可现代化理解为认知解离与注意力回收，是冥想中可操作的部分。"
caution = "不追求空无或特殊体验；若引发焦虑、失眠加重或强烈不适，减量或停止。"
sources = [
