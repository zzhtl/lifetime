# 养生修炼体系 —— 以内经为纲，现代可执行化
# 每条 practice 包含：分类、阶段、场景、摘要、步骤、益处、现代解释、注意事项、来源。
# 原典主轴：法于阴阳、食饮有节、起居有常、不妄作劳、四气调神、恬淡虚无、精神内守、治未病。

[[practice]]
category = "diet"
title = "食饮有节：七分饱筑基"
stage = "foundation"
duration_mins = 20
frequency = "每日三餐"
scenes = ["home"]
summary = "以不饥不撑为度，先稳脾胃，再谈补益。"
steps = [
  "每餐先定量，主食、蛋白、蔬菜各有位置，不边刷屏边吃",
  "吃到七分饱停筷，留一点余地给消化",
  "晚餐比午餐少，睡前 3 小时不再大量进食",
  "一周记录 3 天饭后困倦、反酸、腹胀情况，用身体反馈校准",
]
benefit = "减少暴食与餐后困倦，建立稳定的能量节律"
science = "内经所谓有节，落实到现代就是稳定能量摄入、减少过量饮食对血糖和胃肠负担的冲击。"
caution = "糖尿病、胃病、孕期或体重过低者不要自行大幅减食，按医生或营养师建议调整。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Chronic Disease Prevention", url = "https://www.cdc.gov/chronic-disease/prevention/index.html", level = "government" },
]

[[practice]]
category = "diet"
title = "五味调和：不偏嗜为补"
stage = "foundation"
duration_mins = 10
frequency = "每周复盘一次"
scenes = ["home"]
summary = "酸苦甘辛咸都可入口，但不让任何一种味道长期独大。"
steps = [
  "一周看一次饮食：甜饮、重盐、油炸、辛辣是否连续多日过量",
  "每天至少安排一餐清淡菜，给味觉和胃肠一个低刺激窗口",
  "外卖重口后，下一餐以蔬菜、蛋白和温水收回来",
  "不要用补品替代正常吃饭，先把普通食物吃稳",
]
benefit = "降低重口味依赖，减少盐、糖、油过量带来的长期风险"
science = "五味调和可转译为饮食多样化与不过量，现代公共卫生也强调限制盐、糖和饱和脂肪。"
caution = "肾病、高血压、痛风等人群对盐、蛋白、嘌呤有特殊限制，需要遵医嘱。"
sources = [
  { name = "黄帝内经·素问·阴阳应象大论", url = "https://ctext.org/huangdi-neijing/yin-yang-ying-xiang-da-lun/zhs", level = "classic" },
  { name = "American Heart Association Life's Essential 8", url = "https://www.heart.org/en/healthy-living/healthy-lifestyle/lifes-essential-8", level = "guideline" },
]

[[practice]]
category = "diet"
title = "谷肉果菜：日用平补"
stage = "entry"
duration_mins = 15
frequency = "每日"
scenes = ["home"]
summary = "把养生落到盘子里：有谷、有肉蛋豆、有蔬果，不靠奇方。"
steps = [
  "每餐先看蔬菜是否足量，再看蛋白是否稳定",
  "主食尽量有全谷物或薯类轮换，不长期只吃精米白面",
  "蛋白来源在鱼、蛋、奶、豆、瘦肉之间轮换",
  "水果作为加餐，不用果汁替代完整水果",
]
benefit = "提升营养密度，给运动、睡眠和免疫提供基础材料"
science = "均衡饮食能提供蛋白质、纤维、维生素和矿物质，是维持代谢和免疫功能的底座。"
caution = "食物过敏、乳糖不耐或慢病饮食限制者，按个人情况替换。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Chronic Disease Prevention", url = "https://www.cdc.gov/chronic-disease/prevention/index.html", level = "government" },
]

[[practice]]
category = "diet"
title = "酒不为浆：少饮护真"
stage = "foundation"
duration_mins = 0
frequency = "长期"
scenes = ["home"]
summary = "把酒从日常饮料降级为偶尔选择，不用酒助眠、解压、社交硬撑。"
steps = [
  "工作日默认不饮酒，聚餐前先设上限",
  "不空腹喝酒，不用酒配熬夜",
  "喝酒当天补水，但不要用运动抵消酒精",
  "如果发现靠酒放松，改用散步、洗澡、呼吸收功替代",
]
benefit = "减少睡眠破坏、肝脏负担和冲动饮食"
science = "内经批评以酒为浆，现代证据也显示过量饮酒会增加多类慢病和睡眠问题风险。"
caution = "已形成酒精依赖或戒断症状者不要独自骤停，应寻求专业帮助。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Chronic Disease Prevention", url = "https://www.cdc.gov/chronic-disease/prevention/index.html", level = "government" },
]

[[practice]]
category = "diet"
title = "温水润中：不渴亦少饮"
stage = "entry"
duration_mins = 2
frequency = "每 1-2 小时"
scenes = ["office", "home"]
summary = "不用猛灌，以少量多次保持津液之源。"
steps = [
  "晨起先喝一杯温水，唤醒胃肠",
  "工间每 1-2 小时小口喝水",
  "咖啡、浓茶之后补一杯水",
  "睡前 2 小时减少大量饮水，避免夜醒",
]
benefit = "减少口干、头痛和久坐疲劳感"
science = "轻度脱水会影响注意力和体感疲劳，少量多次比一次猛灌更容易长期坚持。"
caution = "心衰、肾衰或医生限制饮水者按医嘱执行。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Chronic Disease Prevention", url = "https://www.cdc.gov/chronic-disease/prevention/index.html", level = "government" },
]

[[practice]]
category = "walking_running"
title = "起居有常：晨光开关"
stage = "foundation"
duration_mins = 10
frequency = "每日晨起"
scenes = ["outdoor", "home"]
summary = "早起先见光，让身心知道一日已开。"
steps = [
  "起床后 30 分钟内到窗边或户外见自然光",
  "做 10 次缓慢抬臂呼吸，再开始看手机",
  "白天尽量把高强度思考安排在光照充足时段",
  "夜间减少强光，给睡眠留出下行通道",
]
benefit = "稳定昼夜节律，让精神白天升、夜间降"
science = "内经强调起居有常，现代生理学中光照是校准生物钟的重要信号。"
caution = "光敏性疾病、偏头痛或眼科疾病人群避免直视强光。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "American Heart Association Life's Essential 8", url = "https://www.heart.org/en/healthy-living/healthy-lifestyle/lifes-essential-8", level = "guideline" },
]

[[practice]]
category = "walking_running"
title = "广步于庭：每日行气"
stage = "entry"
duration_mins = 20
frequency = "每日"
scenes = ["outdoor"]
summary = "以内经春日“广步于庭”为法，把走路作为最稳的入门功。"
steps = [
  "饭后或下班后走 15-20 分钟",
  "速度以能说短句、微微发热为度",
  "肩膀放松，脚步轻，呼吸自然",
  "每周累计到 150 分钟左右，再考虑加量",
]
benefit = "提升心肺底子，打断久坐，让气血运行有路"
science = "快走是低门槛有氧运动，能改善心肺耐力、血压和代谢风险。"
caution = "胸痛、明显气短、头晕或心脏病史者先咨询医生再提高强度。"
sources = [
  { name = "黄帝内经·素问·四气调神大论", url = "https://ctext.org/huangdi-neijing/si-qi-diao-shen-da-lun/zhs", level = "classic" },
  { name = "CDC Adult Physical Activity", url = "https://www.cdc.gov/physical-activity-basics/guidelines/adults.html", level = "guideline" },
]

[[practice]]
category = "walking_running"
title = "慢跑筑基：气长而不喘"
stage = "foundation"
duration_mins = 25
frequency = "每周 2-3 次"
scenes = ["outdoor"]
summary = "跑步不求猛，以能长期做、跑后精神清明为准。"
steps = [
  "先快走 5 分钟热身",
  "慢跑 1 分钟、走 1 分钟，循环 10 次",
  "两周后再逐步延长连续慢跑时间",
  "跑后走 5 分钟收功，再拉伸小腿和髋",
]
benefit = "温和提升心肺耐力，给长期健康打底"
science = "渐进式有氧训练能降低受伤风险，同时累积足量中等强度活动。"
caution = "膝踝疼痛、体重较大或长期不运动者先从快走开始。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Adult Physical Activity", url = "https://www.cdc.gov/physical-activity-basics/guidelines/adults.html", level = "guideline" },
]

[[practice]]
category = "walking_running"
title = "昼动夜藏：下班收阳"
stage = "foundation"
duration_mins = 15
frequency = "每日傍晚"
scenes = ["office", "home"]
summary = "工作结束后用轻步行把兴奋降下来，别把白天的火带到床上。"
steps = [
  "下班后走 10-15 分钟，不听高刺激内容",
  "回家后先洗漱或换衣，建立工作与休息的边界",
  "晚间避免临睡前高强度运动",
  "睡前 30 分钟做安静收功",
]
benefit = "帮助从工作模式切到休息模式，减少夜间亢奋"
science = "内经有藏养思想，现代睡眠管理也强调睡前降低刺激和规律作息。"
caution = "夜间户外步行注意安全，低血糖人群不要空腹久走。"
sources = [
  { name = "黄帝内经·素问·四气调神大论", url = "https://ctext.org/huangdi-neijing/si-qi-diao-shen-da-lun/zhs", level = "classic" },
  { name = "American Heart Association Life's Essential 8", url = "https://www.heart.org/en/healthy-living/healthy-lifestyle/lifes-essential-8", level = "guideline" },
]

[[practice]]
category = "walking_running"
title = "久坐破局：一刻一动"
stage = "entry"
duration_mins = 2
frequency = "每 30-60 分钟"
scenes = ["office"]
summary = "不让形体久困一处，短短两分钟也算行气。"
steps = [
  "起身接水或走到窗边",
  "脚踝转动 10 圈，踮脚 10 次",
  "肩膀向后绕 10 次",
  "回座位前看远处 20 秒",
]
benefit = "打断久坐，对腿部循环、眼睛和肩颈都有帮助"
science = "久坐会降低肌肉活动和下肢循环，频繁短活动是低成本干预。"
caution = "眩晕、低血压或平衡差者起身要慢。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Adult Physical Activity", url = "https://www.cdc.gov/physical-activity-basics/guidelines/adults.html", level = "guideline" },
]

[[practice]]
category = "taiji_qigong"
title = "静立守中：站桩入门"
stage = "entry"
duration_mins = 5
frequency = "每日"
scenes = ["home"]
summary = "先不追求气感，只练松、稳、匀。"
steps = [
  "双脚与肩同宽，膝微屈，尾闾自然下沉",
  "下巴微收，肩肘放松，手自然抱圆",
  "目光平视或微垂，呼吸自然",
  "从 3-5 分钟开始，站到微热即止",
]
benefit = "训练姿势觉、呼吸稳定和下肢耐力"
science = "站桩可理解为低强度等长训练与注意力训练，重点在放松和稳定。"
caution = "膝痛、头晕或血压不稳者缩短时间，必要时扶椅背。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Qigong", url = "https://www.nccih.nih.gov/health/qigong-what-you-need-to-know", level = "government" },
]

[[practice]]
category = "taiji_qigong"
title = "太极云手：开合行气"
stage = "foundation"
duration_mins = 8
frequency = "每周 3-5 次"
scenes = ["home"]
summary = "以缓慢旋转带动胸椎、肩胛和髋，练一身协调。"
steps = [
  "双脚略宽，重心左右缓慢移动",
  "双手随腰转，如抱球在胸前开合",
  "眼随手走，但头颈不甩",
  "左右各 10-20 次，动作越慢越好",
]
benefit = "改善平衡、肩背活动和身心放松"
science = "太极类练习结合低强度运动、平衡训练和注意力训练，适合长期维护。"
caution = "膝关节不适时减小重心移动幅度，不要追求低架。"
sources = [
  { name = "黄帝内经·素问·阴阳应象大论", url = "https://ctext.org/huangdi-neijing/yin-yang-ying-xiang-da-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Tai Chi", url = "https://www.nccih.nih.gov/health/tai-chi-what-you-need-to-know", level = "government" },
]

[[practice]]
category = "taiji_qigong"
title = "八段锦晨课：温养筋脉"
stage = "foundation"
duration_mins = 12
frequency = "每周 3 次"
scenes = ["home", "outdoor"]
summary = "借传统导引之形，做一套可持续的晨间活动。"
steps = [
  "先原地站定 1 分钟，呼吸平稳",
  "选择双手托天、左右开弓、调理脾胃、背后七颠四式",
  "每式 6-8 次，动作缓慢，不憋气",
  "结束后站定 1 分钟，感受呼吸和心跳回落",
]
benefit = "温和活动肩、背、髋和下肢，适合轻量晨练"
science = "导引类练习结合动态拉伸、低强度力量和呼吸节律，可作为久坐人群的基础活动。"
caution = "肩痛、眩晕、近期手术者先选小幅度版本。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Qigong", url = "https://www.nccih.nih.gov/health/qigong-what-you-need-to-know", level = "government" },
]

[[practice]]
category = "taiji_qigong"
title = "按跷自摩：颈肩收功"
stage = "entry"
duration_mins = 4
frequency = "工间或睡前"
scenes = ["office", "bedtime"]
summary = "以轻柔按揉代替硬扛，舒缓紧张而不强刺激。"
steps = [
  "搓热双手，轻揉后颈和肩上方 30 秒",
  "用指腹从眉心向太阳穴轻推 10 次",
  "肩胛向后绕 10 次",
  "最后做 3 次缓慢呼吸，不马上回到屏幕",
]
benefit = "缓解颈肩紧绷，给神经系统一个放松信号"
science = "轻柔触压和慢呼吸可降低紧张感，但不替代疼痛诊疗。"
caution = "皮肤破损、急性扭伤、神经麻木或持续疼痛时不要按揉，及时就医。"
sources = [
  { name = "黄帝内经·素问·异法方宜论", url = "https://ctext.org/huangdi-neijing/yi-fa-fang-yi-lun/zhs", level = "classic" },
  { name = "Harvard Health Relaxation Techniques", url = "https://www.health.harvard.edu/mind-and-mood/six-relaxation-techniques-to-reduce-stress", level = "medical_center" },
]

[[practice]]
category = "taiji_qigong"
title = "开阖吐纳：不求玄感"
stage = "foundation"
duration_mins = 6
frequency = "每日"
scenes = ["home", "office"]
summary = "练气先练息，息匀则心稳。"
steps = [
  "双手在胸前缓慢打开时吸气",
  "双手合回丹田前方时呼气",
  "吸 4 秒、呼 6 秒，连续 10 轮",
  "全程不憋气、不追求热麻胀等感觉",
]
benefit = "降低急躁感，建立呼吸与动作协调"
science = "延长呼气的慢呼吸可帮助放松，动作同步能增强身体觉察。"
caution = "初练头晕说明用力过度，恢复自然呼吸并坐下休息。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Relaxation Techniques", url = "https://www.nccih.nih.gov/health/relaxation-techniques-what-you-need-to-know", level = "government" },
]

[[practice]]
category = "stretching"
title = "不妄作劳：三分练七分养"
stage = "foundation"
duration_mins = 5
frequency = "每日复盘"
scenes = ["home"]
summary = "训练不是越狠越好，能恢复才算修炼。"
steps = [
  "每天记录睡眠、疲劳、疼痛、心情四项",
  "疲劳明显时把跑步改成散步，把力量改成拉伸",
  "每周至少留 1 天轻量恢复",
  "疼痛超过 48 小时不硬练",
]
benefit = "减少过劳和运动损伤，让习惯可持续"
science = "适应来自训练和恢复的配合，长期过量会增加受伤和睡眠问题。"
caution = "胸痛、黑便、晕厥、肢体麻木等不是普通疲劳，应及时就医。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Adult Physical Activity", url = "https://www.cdc.gov/physical-activity-basics/guidelines/adults.html", level = "guideline" },
]

[[practice]]
category = "stretching"
title = "颈肩开关：伏案解缚"
stage = "entry"
duration_mins = 3
frequency = "每 1-2 小时"
scenes = ["office"]
summary = "久坐最先困住颈肩，先解上焦之结。"
steps = [
  "下巴水平后收 8 次",
  "肩膀向后绕 10 次",
  "双臂成 W 形，肩胛向后夹 8 次",
  "最后看远处 20 秒",
]
benefit = "缓解低头和圆肩带来的紧张"
science = "短时活动可恢复肩颈肌肉血流和关节活动度。"
caution = "手麻、放射痛、眩晕或近期颈部外伤者不要自行加大幅度。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "Harvard Health Relaxation Techniques", url = "https://www.health.harvard.edu/mind-and-mood/six-relaxation-techniques-to-reduce-stress", level = "medical_center" },
]

[[practice]]
category = "mind_breath"
title = "打坐守息：一炷香入门"
stage = "entry"
duration_mins = 10
frequency = "每日 1 次"
scenes = ["home", "bedtime"]
summary = "以安坐、守息、少念为入门，不追异象，不求神通。"
steps = [
  "选安静处坐稳，可盘坐、正坐或坐椅，脊柱自然竖起",
  "双手轻放腿上，下巴微收，舌抵上腭可有可无，不必用力",
  "先听自然呼吸 1 分钟，不调整",
  "把注意力放在鼻端气息出入，走神时温和带回",
  "从 10 分钟开始，结束后搓手、揉面、缓慢睁眼",
]
benefit = "建立静定入口，减少心神外驰，给睡眠和情绪一个缓冲区"
science = "打坐可转译为专注冥想与放松训练，核心是稳定注意力和降低过度唤醒。"
caution = "不要长时间硬坐；出现恐惧、胸闷、解离感或 intrusive thoughts 时停止。精神疾病、创伤史或癫痫人群先咨询专业人士。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "mind_breath"
title = "内观身受：由身入心"
stage = "foundation"
duration_mins = 12
frequency = "每周 3-5 次"
scenes = ["home", "bedtime"]
summary = "不急着压念头，先照见身体感受，让神有所归。"
steps = [
  "仰卧或端坐，先做 3 次自然长呼气",
  "从脚趾开始，依次觉察脚、腿、腹、胸、肩、脸",
  "每处只问：紧、松、冷、热、麻、胀、无感，是什么",
  "遇到不舒服，不评判，不强行驱散，只放慢呼气",
  "结束时记录一个最明显的身体信号",
]
benefit = "提升身体觉察，减少情绪直接裹挟行动"
science = "身体扫描属于正念练习的一种，有助于压力管理和注意力回收。"
caution = "创伤记忆容易被身体觉察触发的人，先用睁眼、短时、可中断版本。强烈不适时停止。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "mind_breath"
title = "丹田息：意守下腹"
stage = "foundation"
duration_mins = 8
frequency = "每日"
scenes = ["home", "office"]
summary = "以意守下腹为锚，让呼吸从胸口浮躁转向沉稳。"
steps = [
  "坐稳或站稳，一手轻放下腹，不按压",
  "吸气时感觉下腹微微展开，呼气时自然回落",
  "不刻意鼓肚，不憋气，不追求热感",
  "每次 12-20 轮，结束后自然呼吸 1 分钟",
]
benefit = "缓解胸式浅呼吸和紧张上提，让身心更沉稳"
science = "腹式呼吸可增加横膈膜参与，帮助降低颈肩辅助呼吸肌紧张。"
caution = "腹部手术恢复期、孕期、严重胃肠不适者不要刻意腹压；头晕则回到自然呼吸。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Relaxation Techniques", url = "https://www.nccih.nih.gov/health/relaxation-techniques-what-you-need-to-know", level = "government" },
]

[[practice]]
category = "mind_breath"
title = "数息入静：十息一轮"
stage = "entry"
duration_mins = 6
frequency = "工间或睡前"
scenes = ["office", "home", "bedtime"]
summary = "念头散乱时，不与念头斗，只用十息收束。"
steps = [
  "吸气不数，呼气时心中数一",
  "从一数到十，错了或忘了就从一重新开始",
  "数息时肩颈放松，眼睛可微闭",
  "完成 3-5 轮即可，不追求空白无念",
]
benefit = "给焦躁的大脑一个简单锚点，适合工作间隙快速收心"
science = "数息结合了注意力锚定和慢呼吸，能减少反复分心。"
caution = "如果越数越烦，改成听环境声音或睁眼看固定点。不要把数息变成强迫任务。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "mind_breath"
title = "周天观想：只观不领"
stage = "advanced"
duration_mins = 10
frequency = "每周 2-3 次"
scenes = ["home"]
summary = "以温和路线观想代替强行导气，不冲关，不憋气。"
steps = [
  "先做 5 分钟自然守息，身心平稳后再开始",
  "吸气时只轻轻觉察脊柱后侧由下向上",
  "呼气时只轻轻觉察身体前侧由上向下",
  "全程像看云，不用力带动任何感觉",
  "10 分钟内结束，收功时搓手揉面、慢慢走动",
]
benefit = "训练身体地图和注意力流动，增加练习沉浸感"
science = "路线观想可视作身体意象训练，重点在注意力调节，不等同于医学治疗。"
caution = "不要追求气冲、发热、震动等体验；出现恐慌、头胀、失眠加重时停止。初学者先练守息和内观。"
sources = [
  { name = "黄帝内经·素问·阴阳应象大论", url = "https://ctext.org/huangdi-neijing/yin-yang-ying-xiang-da-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "mind_breath"
title = "行禅步息：动中练气"
stage = "foundation"
duration_mins = 10
frequency = "每日"
scenes = ["outdoor", "home"]
summary = "静坐坐不住时，以慢步调息，动中求静。"
steps = [
  "选一段安全平路或房间来回走",
  "走 3 步吸气，走 4-5 步呼气，步子小而稳",
  "注意脚掌触地、重心移动、肩颈放松",
  "杂念来时回到脚底，不评价自己",
  "结束后站定 30 秒，再回到日常动作",
]
benefit = "把练气从坐垫带到日常，适合焦躁、久坐和睡前散步"
science = "步行冥想结合低强度活动和正念觉察，可用于压力管理。"
caution = "不要在车流、楼梯或复杂路面练；头晕、低血糖时先休息和补充能量。"
sources = [
  { name = "黄帝内经·素问·四气调神大论", url = "https://ctext.org/huangdi-neijing/si-qi-diao-shen-da-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Mind and Body Approaches for Stress", url = "https://www.nccih.nih.gov/health/providers/digest/mind-and-body-approaches-for-stress", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "修仙总纲：先修成人，再谈成仙"
stage = "entry"
duration_mins = 15
frequency = "开始前通读，每月复盘"
scenes = ["home"]
summary = "修仙在本应用中定义为身心训练体系：戒偏、筑基、静定、导引、调息、内观、日用，不承诺超自然结果。"
steps = [
  "先定目标：睡更稳、心更静、身体更轻、欲望更少，而不是追求异象",
  "前三十天只做作息、饮食、步行、守息四件事",
  "任何功法都以不伤身、不扰眠、不加重焦虑为界",
  "每周记录四个验效：睡眠、情绪、精力、疼痛",
  "出现恐慌、失眠加重、幻觉、强迫练功时立即停练",
]
benefit = "给修炼设边界，避免一开始就走向玄想、过劳或危险练法"
science = "传统修炼中的筑基可转译为生活节律、注意力、呼吸和体能底盘的长期训练。"
caution = "本体系不是医疗、宗教承诺或超自然训练；精神疾病、癫痫、严重创伤史人群练静功前应咨询专业人士。"
sources = [
  { name = "坐忘论", url = "https://ctext.org/wiki.pl?if=gb&remap=gb&res=270447", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "第一关：戒偏立愿"
stage = "entry"
duration_mins = 10
frequency = "第 1 周每日"
scenes = ["home", "bedtime"]
summary = "修仙先戒偏：戒熬夜、戒暴食、戒酒色耗散、戒急求神效。"
steps = [
  "写下三条戒偏：不熬夜硬撑、不暴食重口、不追求气感异象",
  "把手机夜间推送关闭，睡前 30 分钟不刷刺激内容",
  "酒精、夜宵、过度色情刺激先降频，不用意志力硬抗一切",
  "每天睡前复盘：今日哪一处守住了，哪一处失守了",
]
benefit = "先减少耗散，让后续打坐、调息和运动有根基"
science = "作息、刺激控制和行为记录能降低冲动行为，让注意力训练更容易坚持。"
caution = "不要把戒偏变成自责或极端禁欲；成瘾、失控或明显痛苦时需要专业帮助。"
sources = [
  { name = "太上老君说常清静妙经", url = "https://ctext.org/wiki.pl?chapter=441839&if=gb&remap=gb", level = "classic" },
