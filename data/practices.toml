]

[[practice]]
category = "xian_cultivation"
title = "第五关：服气正法"
stage = "foundation"
duration_mins = 8
frequency = "每日 1 次"
scenes = ["home", "office"]
summary = "这里的服气只取调息养神之义，不闭气、不吞气、不硬导。"
steps = [
  "坐稳，吸气 4 秒，呼气 6 秒，先做 12 轮",
  "呼气时想象胸口松开、肩颈下沉",
  "第二阶段改为吸 4 秒、呼 8 秒，但不憋气",
  "练后自然呼吸 1 分钟，再起身活动",
]
benefit = "让气息由急促转为细长，辅助收心和降躁"
science = "慢呼吸和延长呼气可触发放松反应，改善压力状态下的呼吸模式。"
caution = "严禁长时间闭息、强行吞咽空气或追求缺氧快感；头晕胸闷立即停止。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH NCCIH Relaxation Techniques", url = "https://www.nccih.nih.gov/health/relaxation-techniques-what-you-need-to-know", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "第六关：导引开脉"
stage = "foundation"
duration_mins = 15
frequency = "每周 3-5 次"
scenes = ["home", "outdoor"]
summary = "开脉不靠神秘冲击，而靠关节、筋膜、呼吸和步行逐步打开。"
steps = [
  "肩颈：下巴后收 8 次，肩胛后绕 10 次",
  "胸背：猫牛式 8 次，站立开胸 30 秒",
  "髋腿：4 字拉伸左右各 30 秒，提踵 20 次",
  "全身：慢走 5 分钟，把呼吸放匀",
]
benefit = "让打坐不被身体僵硬拖住，也降低久坐不适"
science = "动态活动、温和拉伸和低强度步行能改善活动度与循环。"
caution = "疼痛不是开脉；尖锐痛、麻木、放射痛都应停止。"
sources = [
  { name = "黄帝内经·素问·异法方宜论", url = "https://ctext.org/huangdi-neijing/yi-fa-fang-yi-lun/zhs", level = "classic" },
  { name = "CDC Adult Physical Activity", url = "https://www.cdc.gov/physical-activity-basics/guidelines/adults.html", level = "guideline" },
]

[[practice]]
category = "xian_cultivation"
title = "第七关：守一不散"
stage = "advanced"
duration_mins = 15
frequency = "每周 3 次"
scenes = ["home"]
summary = "守一是把心放在一个稳定锚点上，不让念头四散。"
steps = [
  "先做 5 分钟数息，心稍稳后进入守一",
  "锚点可选鼻端、下腹或脚底，只选一个",
  "念头出现时，只标记“想”，然后回锚点",
  "每次 15 分钟封顶，练后写下分心最多的主题",
]
benefit = "训练专注与回收能力，让日常工作更不散乱"
science = "单点专注训练能提高注意控制，关键是反复回到锚点而非强迫无念。"
caution = "不要把守一练成屏息或紧盯；头胀、焦虑、失眠加重时降为 5 分钟。"
sources = [
  { name = "太上老君说常清静妙经", url = "https://ctext.org/wiki.pl?chapter=441839&if=gb&remap=gb", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "第八关：小周天观想"
stage = "advanced"
duration_mins = 10
frequency = "每周 2 次"
scenes = ["home"]
summary = "只做温和观想，不搬运、不冲关、不追气感。"
steps = [
  "先练守息 5 分钟，身体和情绪稳定再开始",
  "吸气时轻观后背中线由下而上",
  "呼气时轻观身体前侧由上而下",
  "如果没有感觉，完全正常，只保持柔和路线感",
  "练后慢走 2 分钟收功",
]
benefit = "增加身体意象和注意力流动感，是进阶沉浸练习"
science = "身体意象训练可增强身体觉察；效果以平静、睡眠和注意力改善为观察点。"
caution = "不要追求热流、震动、冲顶等强体验；出现头胀、心悸、失眠加重就停止。"
sources = [
  { name = "周易参同契", url = "https://ctext.org/wiki.pl?chapter=209399&if=gb&remap=gb", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "第九关：日用验效"
stage = "long_term"
duration_mins = 5
frequency = "每日收尾"
scenes = ["home", "bedtime"]
summary = "修仙要看日用效果：睡眠、情绪、身体、做人做事，而不是只看坐中异象。"
steps = [
  "睡眠：入睡是否更容易，夜醒是否减少",
  "情绪：是否更少冲动回复、更少暴怒",
  "身体：肩颈、腰背、胃口、精力是否更稳",
  "行为：是否更能守时、少刷屏、少暴食",
  "每周只选一个指标改，不同时追十个目标",
]
benefit = "把修炼拉回现实生活，让效果可观察、可复盘"
science = "行为指标比主观神秘体验更稳定，能帮助判断练习是否真正有益。"
caution = "如果练功后变得更孤僻、更焦虑、更失眠，说明方向偏了，需要减量或停止。"
sources = [
  { name = "坐忘论", url = "https://ctext.org/wiki.pl?if=gb&remap=gb&res=270447", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "第十关：辨伪避坑"
stage = "long_term"
duration_mins = 10
frequency = "每月复盘"
scenes = ["home"]
summary = "修仙最怕贪快：辟谷、闭息、采药、房中、金石丹药都要设红线。"
steps = [
  "不自行辟谷断食，尤其不带病、不独居、不长时间断水断盐",
  "不练长闭息，不追求缺氧、幻觉、出神",
  "不服来路不明丹药、矿物、草药和高剂量补剂",
  "不把性压抑、纵欲或房中术包装成捷径",
  "凡声称速成、包灵、传秘价高者，一律先远离",
]
benefit = "避免修炼伤身、被骗或诱发精神/身体风险"
science = "极端禁食、闭气、未知药物和睡眠剥夺都可能造成真实风险。"
caution = "任何强烈身体症状、精神异常或被组织控制感，都应停止并寻求现实支持。"
sources = [
  { name = "悟真篇", url = "https://zh.wikisource.org/wiki/%E6%82%9F%E7%9C%9F%E7%AF%87", level = "classic" },
  { name = "NIH NCCIH Relaxation Techniques", url = "https://www.nccih.nih.gov/health/relaxation-techniques-what-you-need-to-know", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "第十一关：三个月次第"
stage = "long_term"
duration_mins = 30
frequency = "按月推进"
scenes = ["home", "outdoor"]
summary = "给修炼排次序：先身体和作息，再静坐调息，最后才做观想。"
steps = [
  "第 1 月：睡眠、步行、七分饱、数息，目标是稳定",
  "第 2 月：加入打坐守息、内观身受、导引开脉，目标是放松",
  "第 3 月：加入守一、小周天观想，目标是细腻觉察",
  "任何阶段睡眠变差、情绪变差，就退回上一阶段",
  "三个月结束后只保留最有效的三项日课",
]
benefit = "让修仙体系有路线，不在网上资料里东练一招西练一招"
science = "渐进式训练能降低风险，也更容易判断每个练习对自己的影响。"
caution = "进阶不是越玄越好；现实生活变稳定，才是进入下一阶段的条件。"
sources = [
  { name = "坐忘论", url = "https://ctext.org/wiki.pl?if=gb&remap=gb&res=270447", level = "classic" },
  { name = "NIH NCCIH Mind and Body Approaches for Stress", url = "https://www.nccih.nih.gov/health/providers/digest/mind-and-body-approaches-for-stress", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "经典研读次第：先明路，再下功"
stage = "entry"
duration_mins = 20
frequency = "每周 2 次"
scenes = ["home"]
summary = "修仙资料繁杂，先用经典建立地图：清静定心、坐忘收心、金华回光、黄庭内观、钟吕辨层次。"
steps = [
  "第一层读《清静经》《坐忘论》，只取清静、收心、简事",
  "第二层读《太乙金华宗旨》，只取回光返照和日用不废正业",
  "第三层读《黄庭经》，只取身体内观和三田身观，不做神怪执着",
  "第四层读《钟吕传道集》《入药镜》，只取辨层次、法自然、防火候过度",
  "每读一篇，只转成一个日课动作，不同时练多法",
]
benefit = "减少东拼西凑，形成可跟练、可复盘的修炼地图"
science = "复杂体系需要学习顺序；把抽象经典转成少量行为任务，更利于长期坚持。"
caution = "经典语言多用象征，不要按字面强行导气、闭息、采药或服食。"
sources = [
  { name = "太乙金华宗旨", url = "https://zh.wikisource.org/zh-hans/%E5%A4%AA%E4%B9%99%E9%87%91%E8%8F%AF%E5%AE%97%E6%97%A8", level = "classic" },
  { name = "钟吕传道集", url = "https://ctext.org/wiki.pl?if=gb&remap=gb&res=734873", level = "classic" },
]

[[practice]]
category = "xian_cultivation"
title = "太乙金华宗旨：回光返照"
stage = "foundation"
duration_mins = 12
frequency = "每周 3-5 次"
scenes = ["home", "bedtime"]
summary = "取《太乙金华宗旨》回光之法，转译为柔和的注意力回收：光不外驰，神不散乱。"
steps = [
  "坐稳，先自然守息 3 分钟",
  "眼帘轻垂，不盯眉心，不挤眼，不用力上提",
  "把注意力从外界事务收回到呼吸和眼后安静感",
  "念头出现时，不追内容，只知道“光又外驰”，再轻轻收回",
  "结束后揉面、转肩、慢走 1 分钟，不立刻看屏幕",
]
benefit = "训练从外物牵引中回收注意力，适合睡前和高压后收神"
science = "回光可现代化理解为注意力从外界刺激回到稳定内在锚点，类似专注冥想。"
caution = "不要盯眉心、强压眼球、追求光影；头胀、眼压不适、失眠加重时停止。"
sources = [
  { name = "太乙金华宗旨", url = "https://zh.wikisource.org/zh-hans/%E5%A4%AA%E4%B9%99%E9%87%91%E8%8F%AF%E5%AE%97%E6%97%A8", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "金华活法：日用返照"
stage = "foundation"
duration_mins = 3
frequency = "每日多次"
scenes = ["office", "home"]
summary = "《金华》强调回光不废正业；修炼不只在坐中，也在应事接物时返照。"
steps = [
  "打开消息前，先停 1 次呼吸",
  "情绪起时，问一句：我现在被什么牵走了",
  "处理事务时只处理眼前一件，做完再切下一件",
  "每次分心回来，不责备，只记作一次回光",
]
benefit = "把修仙从仪式变成日用，减少工作中被情绪和通知牵引"
science = "短暂停顿和任务单线程化可降低注意切换成本，帮助自我调节。"
caution = "返照不是压抑情绪；重要冲突仍需要沟通和现实处理。"
sources = [
  { name = "太乙金华宗旨·回光活法", url = "https://www.quanxue.cn/ct_daojia/jinghua/jinghua07.html", level = "classic" },
  { name = "Harvard Health Relaxation Techniques", url = "https://www.health.harvard.edu/mind-and-mood/six-relaxation-techniques-to-reduce-stress", level = "medical_center" },
]

[[practice]]
category = "xian_cultivation"
title = "黄庭经：三田身观"
stage = "foundation"
duration_mins = 10
frequency = "每周 2-3 次"
scenes = ["home"]
summary = "取《黄庭经》内景身观之意，练上中下三田觉察，不执着身神图像。"
steps = [
  "上田：觉察眉心和头面是否紧张，放松额头和眼周",
  "中田：觉察胸口和肩背，呼气时让胸口松开",
  "下田：觉察下腹起伏，呼吸自然下沉",
  "三处各停 2-3 分钟，最后全身一起觉察",
]
benefit = "建立头、胸、腹三层身体地图，辅助打坐和调息"
science = "三田身观可转译为分区身体扫描，有助于发现紧张和浅呼吸模式。"
caution = "不要执着体内神像、光影或内脏感觉；身体不适应以医学检查为准。"
sources = [
  { name = "黄庭经", url = "https://zh.wikipedia.org/wiki/%E9%BB%84%E5%BA%AD%E7%BB%8F", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "阴符经：观天执时"
stage = "long_term"
duration_mins = 8
frequency = "每周复盘"
scenes = ["home"]
summary = "取《阴符经》观天之道，转成节律修炼：顺光照、顺四时、顺身体反馈。"
steps = [
  "每周看一次作息：是否昼夜颠倒、夜间过度兴奋",
  "看天气和季节调整运动，不在酷暑寒潮硬练",
  "看身体反馈调整功课：睡差则减静坐，疼痛则减运动",
  "把修炼安排在最容易坚持的时辰，不迷信固定子午",
]
benefit = "减少逆势硬练，让修炼顺应环境和身体节律"
science = "光照、温度、睡眠和训练恢复都会影响身心状态，按反馈调整更安全。"
caution = "不要用天时术语替代医学判断；明显症状和异常指标需要现实处理。"
sources = [
  { name = "阴符经", url = "https://www.shixiu.net/dujing/daojiaojingdian/1009.html", level = "classic" },
  { name = "American Heart Association Life's Essential 8", url = "https://www.heart.org/en/healthy-living/healthy-lifestyle/lifes-essential-8", level = "guideline" },
]

[[practice]]
category = "xian_cultivation"
title = "性命圭旨：性命双修日课"
stage = "long_term"
duration_mins = 25
frequency = "每周 3 次"
scenes = ["home", "outdoor"]
summary = "性为心性，命为身体；每天只修心不动身，或只练身不收心，都偏。"
steps = [
  "命功：快走、导引或自重力量 15 分钟",
  "性功：打坐守息或内观 10 分钟",
  "练后记录：身体是否更轻，心是否更稳",
  "如果练后更躁、更累、更迷恋体验，下一次减量",
]
benefit = "把身体训练和心性训练合成一套，不偏枯"
science = "运动改善体能和代谢，冥想训练注意力与压力调节，两者互补。"
caution = "不要把性命双修理解成房中捷径或极端禁欲；以稳定、清明、可持续为准。"
sources = [
  { name = "性命圭旨", url = "https://zh.wikisource.org/wiki/%E6%80%A7%E5%91%BD%E5%9C%AD%E6%97%A8/%E5%85%83%E9%9B%86", level = "classic" },
  { name = "CDC Adult Physical Activity", url = "https://www.cdc.gov/physical-activity-basics/guidelines/adults.html", level = "guideline" },
]

[[practice]]
category = "xian_cultivation"
title = "钟吕传道集：辨层次与魔难"
stage = "long_term"
duration_mins = 10
frequency = "每月复盘"
scenes = ["home"]
summary = "取《钟吕传道集》重视层次、证验、魔难之意，给修炼设置进退标准。"
steps = [
  "入门层：睡眠稳定、饮食有节、能每日守息",
  "筑基层：能连续 30 天练，不因体验好坏大起大落",
  "进阶层：能做观想但不追异象，现实工作不受损",
  "魔难检查：若更傲慢、更孤僻、更迷信、更失眠，立即退阶",
]
benefit = "让修炼有层级，不因一时体验误判进境"
science = "分级训练和风险复盘能降低过量练习、焦虑和功能受损风险。"
caution = "任何让现实功能下降的练法都应暂停；不要以“魔考”合理化痛苦和失控。"
sources = [
  { name = "钟吕传道集", url = "https://ctext.org/wiki.pl?if=gb&remap=gb&res=734873", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "入药镜：火候止足"
stage = "advanced"
duration_mins = 5
frequency = "每次进阶前"
scenes = ["home"]
summary = "取《入药镜》火候之戒：功夫到处要会止，过度用力反伤身心。"
steps = [
  "每次进阶只增加一个变量：时长、频率、观想深度三选一",
  "睡眠变差、头胀心悸、情绪亢奋时，视为火候过度",
  "过度后退回自然呼吸、散步和规律睡眠 3 天",
  "任何强烈体验都先观察 24 小时，不立刻加练",
]
benefit = "避免越练越躁、越练越伤，建立止足能力"
science = "训练负荷需要递增也需要恢复；冥想过量同样可能带来不适。"
caution = "不要自行闭气、强导、辟谷或服药追求火候；出现精神异常应停止并求助。"
sources = [
  { name = "入药镜", url = "https://www.shidianguji.com/book/ZWDS0121q/chapter/1lmoamv1ldzxk", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "stretching"
title = "髋背舒展：坐久开门"
stage = "entry"
duration_mins = 6
frequency = "每日"
scenes = ["home"]
summary = "髋不开，腰背常代偿；先让髋和胸椎动起来。"
steps = [
  "猫牛式 8 次",
  "站立侧弯左右各 20 秒",
  "仰卧 4 字拉伸左右各 30 秒",
  "结束后慢走 1 分钟",
]
benefit = "改善久坐后的腰髋僵硬"
science = "动态活动和温和拉伸可改善关节活动范围，减少代偿紧张。"
caution = "腰椎间盘突出急性期、髋膝疼痛者先做小幅度或咨询专业人士。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
