[[practice]]
category = "stretching"
title = "跑后收阴：缓步拉伸"
stage = "foundation"
duration_mins = 8
frequency = "每次跑后"
scenes = ["outdoor", "home"]
summary = "运动后不骤停，以缓步和拉伸把身体收回来。"
steps = [
  "先慢走 5 分钟，等呼吸平稳",
  "小腿、股四头肌、臀部各拉伸 30 秒",
  "补水小口饮，不立刻冲冷水",
  "记录跑后 24 小时膝踝反馈",
]
benefit = "帮助心率下降，减少第二天紧绷"
science = "冷身能让循环逐步回落，拉伸可改善主观紧张感。"
caution = "抽筋、胸闷、异常心悸时停止训练并评估。"
sources = [
  { name = "黄帝内经·素问·阴阳应象大论", url = "https://ctext.org/huangdi-neijing/yin-yang-ying-xiang-da-lun/zhs", level = "classic" },
  { name = "CDC Adult Physical Activity", url = "https://www.cdc.gov/physical-activity-basics/guidelines/adults.html", level = "guideline" },
