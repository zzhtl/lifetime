]

[[practice]]
category = "stretching"
title = "跑前升阳：动态热身"
stage = "foundation"
duration_mins = 8
frequency = "每次跑前"
scenes = ["outdoor"]
summary = "动前先温，不让筋骨骤然受令。"
steps = [
  "快走 3 分钟",
  "高抬腿、小步后踢、侧向移动各 30 秒",
  "踝关节、髋关节各转 10 圈",
  "前 5 分钟跑得比计划更慢",
]
benefit = "减少跑步初段的僵硬和拉伤风险"
science = "动态热身能提高肌肉温度和神经募集，比冷身直接开跑更稳妥。"
caution = "已经疼痛的部位不要靠热身硬压过去。"
sources = [
  { name = "黄帝内经·素问·阴阳应象大论", url = "https://ctext.org/huangdi-neijing/yin-yang-ying-xiang-da-lun/zhs", level = "classic" },
