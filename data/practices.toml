[[practice]]
category = "prevention"
title = "起坐防跌：稳步固本"
stage = "foundation"
duration_mins = 8
frequency = "每周 2-3 次"
scenes = ["home"]
summary = "治未病也包括防跌：练稳下肢，理顺居家环境。"
steps = [
  "练习起坐：从椅子缓慢站起、坐下 8-10 次，扶稳借力",
  "每天做单脚站立等简单平衡练习，旁边有支撑",
  "清理居家过道杂物、地线和松动地毯，浴室加防滑垫",
  "夜间留一盏小夜灯，起夜先坐稳再起身",
]
benefit = "增强下肢力量与平衡，降低跌倒和意外风险"
science = "下肢力量、平衡训练与居家环境改造是公认的跌倒预防措施，对中老年人尤为重要。"
caution = "已有明显平衡障碍、眩晕或骨质疏松者，应在他人陪同或专业指导下练习。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Adult Physical Activity", url = "https://www.cdc.gov/physical-activity-basics/guidelines/adults.html", level = "guideline" },
]

[[practice]]
category = "prevention"
title = "听力护耳：控噪防损"
stage = "long_term"
duration_mins = 3
frequency = "长期"
scenes = ["office", "home", "outdoor"]
summary = "耳为清窍，噪声伤听不可逆，防在平时。"
steps = [
  "耳机遵循 60-60 原则：音量不超 60%、连续不超 60 分钟",
  "嘈杂环境优先用降噪耳机，靠降噪而非加大音量",
  "接触强噪声（演出、电钻、装修）时佩戴耳塞",
  "耳朵闷响、耳鸣或听力下降持续时及时就医",
]
benefit = "减少噪声性听力损伤，保护长期听力"
science = "长期暴露于过大音量会造成不可逆的噪声性听力损失，控制音量与时长是关键预防手段。"
caution = "突发听力下降、持续耳鸣或耳痛是就医信号，不要自行拖延。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Chronic Disease Prevention", url = "https://www.cdc.gov/chronic-disease/prevention/index.html", level = "government" },
]

[[practice]]
category = "prevention"
title = "皮之屏障：防晒护肤"
stage = "long_term"
duration_mins = 3
frequency = "日间外出"
scenes = ["outdoor", "office"]
summary = "皮肤是第一道屏障，防晒是最省事的护肤和防病。"
steps = [
  "日间外出前涂防晒，或用遮阳帽、墨镜、长袖物理遮挡",
  "正午紫外线强时尽量避开长时间暴晒",
  "干燥时做好保湿，维持皮肤屏障",
  "留意痣或斑块的形状、颜色、大小变化，异常及时就诊",
]
benefit = "降低晒伤、光老化风险，护住皮肤屏障"
science = "紫外线暴露与皮肤老化和皮肤癌风险相关，防晒与遮挡是有效的预防措施。"
caution = "皮肤出现久不愈合的溃疡、快速变化的痣或斑块，应尽早就医评估。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "CDC Chronic Disease Prevention", url = "https://www.cdc.gov/chronic-disease/prevention/index.html", level = "government" },
]

[[practice]]
category = "immunity"
title = "肠道养菌：纤维固卫"
stage = "foundation"
duration_mins = 5
frequency = "每日"
scenes = ["home"]
summary = "正气与肠道相关，喂好菌群，先从纤维和发酵食物入手。"
steps = [
  "每天保证足量蔬菜、全谷物和豆类，摄入多样纤维",
  "适量加入酸奶、纳豆、泡菜等发酵食物",
  "减少高糖、超加工食品对菌群的干扰",
  "增纤维要循序渐进，同时多喝水",
]
benefit = "支持肠道菌群多样性，间接支持免疫与代谢"
science = "膳食纤维和发酵食物有助于肠道菌群多样性，而肠道微生态与免疫调节相关。"
caution = "肠易激、炎症性肠病或术后人群调整膳食纤维需遵医嘱，避免加重不适。"
sources = [
  { name = "黄帝内经·素问·阴阳应象大论", url = "https://ctext.org/huangdi-neijing/yin-yang-ying-xiang-da-lun/zhs", level = "classic" },
  { name = "NIH ODS Immune Function", url = "https://ods.od.nih.gov/factsheets/ImmuneFunction-Consumer/", level = "government" },
]

[[practice]]
category = "immunity"
title = "日照生维：晒背养正"
stage = "entry"
duration_mins = 15
frequency = "晴天"
scenes = ["outdoor"]
summary = "适度晒太阳有助维生素 D，但要防过度暴晒。"
steps = [
  "选紫外线不太强的时段，晒背、手臂 10-15 分钟",
  "避开正午烈日，面部可遮挡防晒",
  "冬季或少见光者，关注维生素 D 是否充足",
  "缺乏时在医生指导下评估是否需要补充",
]
benefit = "帮助维持维生素 D 水平，支持骨骼与免疫"
science = "皮肤经日照可合成维生素 D，其对骨骼健康和免疫功能有重要作用；但需平衡防晒。"
caution = "光敏性疾病、皮肤病史者慎晒；补剂不可自行长期高剂量，需遵医嘱。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
  { name = "NIH ODS Immune Function", url = "https://ods.od.nih.gov/factsheets/ImmuneFunction-Consumer/", level = "government" },
]

[[practice]]
category = "immunity"
title = "宽心固卫：减压养正"
stage = "foundation"
duration_mins = 10
frequency = "每日"
scenes = ["home", "office"]
summary = "长期压力耗散正气，减压也是固本的一环。"
steps = [
  "每天留一段无干扰时间，做慢呼吸或放松练习",
  "把压力事项写下来并拆成下一步，减少空转焦虑",
  "保证睡眠和适度运动，两者是天然的减压器",
  "维持与人的联结，别把压力全憋在心里",
]
benefit = "缓解慢性压力，间接支持免疫与整体状态"
science = "慢性压力会影响免疫与炎症调节，规律放松、睡眠和社交支持有助于压力管理。"
caution = "持续焦虑、抑郁或压力已影响生活功能时，应寻求专业帮助。"
sources = [
  { name = "黄帝内经·素问·上古天真论", url = "https://ctext.org/huangdi-neijing/shang-gu-tian-zhen-lun/zhs", level = "classic" },
