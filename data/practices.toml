[[practice]]
category = "xian_cultivation"
title = "第二关：百日筑基表"
stage = "foundation"
duration_mins = 30
frequency = "连续 100 天"
scenes = ["home", "outdoor"]
summary = "百日不求神秘，只把身、息、心三件事练成日课。"
steps = [
  "每日步行或轻跑 20 分钟，身体微热即可",
  "每日守息 10 分钟，走神就回到鼻端",
  "每日固定睡醒时间，允许入睡有波动",
  "每七天复盘一次，不补练、不翻倍惩罚",
  "第 30、60、100 天分别记录睡眠、心情、体能变化",
]
benefit = "建立可持续的修炼节律，逐步看到睡眠、心情和精力的变化"
science = "稳定习惯比高强度短期冲刺更能改变生活方式；有氧活动和冥想都需要累积效应。"
caution = "连续练不是每天加量；生病、受伤、严重疲劳时改为散步和自然呼吸。"
sources = [
  { name = "周易参同契·炼己立基", url = "https://ctext.org/wiki.pl?chapter=209399&if=gb&remap=gb", level = "classic" },
