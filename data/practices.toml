[[practice]]
category = "xian_cultivation"
title = "悟真炼己：先正身心"
stage = "entry"
duration_mins = 10
frequency = "开始阶段每日"
scenes = ["home"]
summary = "取《悟真篇》先炼己、后筑基之意：先把作息、情绪和心性理顺。"
steps = [
  "炼己第一步是稳住作息、饮食和情绪，不急于求高阶功法",
