[[practice]]
category = "xian_cultivation"
title = "阴符食时：应机养身"
stage = "long_term"
duration_mins = 10
frequency = "每周复盘"
scenes = ["home"]
summary = "取《阴符经》食其时、动其机之意，顺身体与作息的节律行事。"
steps = [
