[[practice]]
category = "yijin_jing"
title = "春三月：发陈生发"
stage = "long_term"
duration_mins = 20
frequency = "春季每日"
scenes = ["outdoor"]
summary = "春主生发，宜早起、缓形、散步，让志意舒展。"
steps = [
  "早起后见光，做 5 分钟舒展",
  "白天安排一次户外步行",
  "多做开胸、转肩、髋部活动",
  "少压抑计划，把一年目标拆成可执行小步",
]
benefit = "顺应春季生发之气，建立新习惯"
science = "季节计划能帮助调整光照、活动量和心理目标，降低突然加量带来的压力。"
caution = "花粉过敏者户外运动避开高峰，必要时戴口罩或按医嘱用药。"
sources = [
  { name = "黄帝内经·素问·四气调神大论", url = "https://ctext.org/huangdi-neijing/si-qi-diao-shen-da-lun/zhs", level = "classic" },
]

[[practice]]
category = "yijin_jing"
title = "夏三月：蕃秀使气得泄"
stage = "long_term"
duration_mins = 15
