]

[[practice]]
category = "xian_cultivation"
title = "坐忘遗形：松身安坐"
stage = "foundation"
duration_mins = 12
frequency = "每周 5 次"
scenes = ["home"]
summary = "取《坐忘论》之意，先把身体彻底放松，再谈收心。"
steps = [
  "端坐或平躺，从头到脚依次放松，每处停留几秒",
  "让下巴、肩膀、手掌、腹部逐一松开",
  "呼气时想象身体又沉下去一点，不用力",
  "身体安定后，只轻轻守着呼吸 5 分钟收尾",
]
benefit = "以放松入静，降低身体紧张对打坐的干扰"
science = "系统性放松与身体扫描有助于降低肌肉紧张和交感兴奋，是入静的稳妥前置。"
caution = "不要长时间硬坐；出现麻木、心悸、强烈情绪时结束练习并活动身体。"
sources = [
