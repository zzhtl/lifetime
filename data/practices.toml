]

[[practice]]
category = "xian_cultivation"
title = "第三关：坐忘七阶"
stage = "foundation"
duration_mins = 12
frequency = "每周 5 次"
scenes = ["home", "bedtime"]
summary = "取《坐忘论》七阶之意：敬信、断缘、收心、简事、真观、泰定、得道；日用只练前三四阶。"
steps = [
  "敬信：相信日课有效，但不神化体验",
  "断缘：坐前 10 分钟断开消息和噪音",
  "收心：守鼻端呼吸，走神即回",
  "简事：当天只抓一个核心任务，不让杂事拖心",
  "真观：观察念头生灭，不急着认同它",
]
benefit = "把打坐从姿势变成完整的生活减法"
science = "减少外界刺激、注意力锚定和认知解离，都是冥想训练中可操作的部分。"
caution = "不要长坐追求泰定；初学者超过 20 分钟容易疲劳或烦躁。"
sources = [
  { name = "坐忘论", url = "https://ctext.org/wiki.pl?if=gb&remap=gb&res=270447", level = "classic" },
  { name = "NIH NCCIH Meditation and Mindfulness", url = "https://www.nccih.nih.gov/health/meditation-and-mindfulness-effectiveness-and-safety", level = "government" },
]

[[practice]]
category = "xian_cultivation"
title = "第四关：清静内观"
stage = "foundation"
duration_mins = 10
frequency = "每日"
scenes = ["home", "bedtime"]
summary = "依《清静经》“内观于心、外观于形”之意，练观察，不练压制。"
steps = [
  "先守息 3 分钟，让呼吸自然慢下来",
  "内观于心：看见念头，不跟着走",
  "外观于形：扫描身体紧、松、冷、热、麻、胀",
  "远观于物：听见声音、感到环境，但不急着评价",
  "结束时写一句：刚才最常出现的念头是什么",
]
benefit = "提高自我觉察，减少被情绪和欲望直接牵走"
science = "内观可转译为正念觉察和身体扫描，对压力管理有一定支持。"
caution = "若内观引发强烈恐惧、创伤画面或解离感，停止练习并寻求专业支持。"
sources = [
