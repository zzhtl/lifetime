# 健康知识库 —— 嵌入二进制（include_str!）
# 每条 tip 包含：分类、标题、时长、频率、步骤、益处、科学依据、注意事项、进阶变式
# 内容参考来源：美国职业安全与健康研究所(NIOSH)、美国眼科学会(AAO)、麦肯基疗法、
# 哈佛医学院公共卫生学院《久坐危害》专题、Cleveland Clinic 物理治疗指南

# ═════════════════════════════ 👁 护眼 (eyes) ═════════════════════════════

[[tip]]
category = "eyes"
title = "20-20-20 法则"
duration_secs = 20
frequency = "每 20 分钟使用屏幕后"
office_break = true
steps = [
  "把视线从屏幕移开",
  "找到 6 米（约 20 英尺）外的物体——窗外的树、远处的墙",
  "保持眺望 20 秒钟，让睫状肌完全松弛",
  "期间自然眨眼（不强制憋眨），让泪膜重新覆盖角膜",
  "若环境允许，看一下远处后再闭眼 5 秒",
  "再回到屏幕，给眼睛一个 2-3 秒缓冲期",
]
benefit = "缓解睫状肌持续收缩、防止假性近视加深、减轻数字视疲劳"
science = "盯近物时睫状肌持续收缩以使晶状体变厚，长时间收缩会让眼周血液循环下降 60%，泪液分泌减少导致干眼。看远处时睫状肌完全松弛，是恢复其弹性的关键。"
caution = "如果你戴的是矫正近距离的渐进多焦点眼镜，看远时务必抬头通过远视区域；近视眼镜则正常使用。"
variants = [
  "1-1-1 加强版：每 1 小时主动起身走到窗边眺望 1 分钟",
  "结合『棕榈式』：眺望后搓热双手，掌心轻盖眼睛 30 秒",
]

[[tip]]
category = "eyes"
title = "眼球转动操（8 字 + 米字）"
duration_secs = 90
frequency = "每 1-2 小时一次"
office_break = true
steps = [
  "坐直，头部完全不动，只动眼球",
  "缓慢从最左看到最右（用 3 秒走完），反方向再来一次",
  "缓慢从最上看到最下（用 3 秒），反方向再来",
  "顺时针画大圆 5 圈，逆时针 5 圈",
  "用眼球在空中画一个『8』字，水平 5 次，垂直 5 次",
  "结束闭眼休息 15 秒",
]
benefit = "活动 6 条眼外肌，改善眼周微循环，预防斜视/复视"
science = "眼球周围有上直肌、下直肌、内直肌、外直肌、上斜肌、下斜肌共 6 块肌肉。久坐凝视屏幕时它们几乎处于固定状态，肌纤维容易短缩。规律拉伸可让肌肉保持均衡张力。"
caution = "如果做的时候有眩晕感，立即停止并睁眼直视前方。视网膜脱落术后或近期眼科手术患者请先咨询医生。"
variants = [
  "进阶：双眼闭上做（更需控制力）",
  "结合冥想：睁眼放空 + 眼球缓慢转动 = 极佳的工间放松",
]

[[tip]]
category = "eyes"
title = "远近交替对焦训练"
duration_secs = 60
frequency = "每天 2-3 次，每次 1 分钟"
office_break = true
steps = [
  "伸出食指放在鼻尖前约 25 厘米",
  "看清食指指纹细节，专注 3-4 秒",
  "快速将视线切换到 6 米外的物体（窗外、墙上时钟）",
  "看清远处物体细节，专注 3-4 秒",
  "再快速切回食指",
  "如此往返 15 次，循环结束闭眼 10 秒",
  "建议站在窗边自然光下做，避免长时间面对屏幕",
]
benefit = "训练睫状肌弹性，改善晶状体调节能力，延缓近视进展"
science = "睫状肌如同弹簧，长期固定在一个工作距离会失去弹性。远近交替强制其反复收缩/舒张，类似肌肉力量训练。研究显示该训练可使近视进展速度减少约 30%。"
caution = "看远处时要找到清晰的细节物，单纯虚焦无效。眩光强烈环境下不要做（如直对太阳）。"
variants = [
  "进阶：增加远距离至 10 米以上",
  "用『Brock 球』专业工具，效果更佳（适合儿童视觉训练）",
]

[[tip]]
category = "eyes"
title = "棕榈式（Palming）热敷"
duration_secs = 120
frequency = "每天 2-3 次，眼睛酸胀时即刻使用"
office_break = true
steps = [
  "找一个安静、可遮光的位置坐下",
  "搓热双手，至感到温度升高（约 30 秒）",
  "微闭双眼，掌心呈杯状轻盖眼睛上方",
  "手掌不要按压眼球，留出空间让眼睛能在掌下眨动",
  "确保完全遮光，看到的应该是均匀的『黑色』",
  "保持 1-2 分钟，期间深呼吸放松",
  "想象温暖渗入眼周，缓慢移开手掌",
  "睁眼后再眨眼几次，让泪膜恢复",
]
benefit = "热度促进眼周血液循环、放松眼肌、缓解长时间用眼后的酸胀"
science = "眼周皮肤血管丰富，外部热源可使局部血流加快约 40%。同时遮光让视网膜处于完全休息状态，瞳孔放大，可降低视觉皮层的兴奋度，类似『视觉冥想』。"
caution = "结膜炎、麦粒肿急性期不宜热敷；隐形眼镜佩戴者应先取下。"
variants = [
  "升级版：用 40°C 左右的湿热毛巾敷 5 分钟",
  "结合精油：薰衣草 1 滴稀释后涂太阳穴（避免靠近眼睛）",
]

[[tip]]
category = "eyes"
title = "刻意眨眼训练"
duration_secs = 45
frequency = "每 30 分钟一次"
office_break = true
steps = [
  "保持坐姿端正，看向屏幕或前方",
  "做一组『慢-用力-放松』眨眼：闭眼 2 秒 → 用力闭眼挤压 2 秒 → 缓慢睁开",
  "重复上述动作 10 组",
  "之间穿插 5 次快速眨眼（每秒 2-3 下）",
  "结束后看远处 10 秒",
  "全天有意识保持眨眼频率：每分钟至少 12-15 次",
]
benefit = "刺激睑板腺分泌油脂、补充泪膜、显著减轻干眼症状"
science = "正常眨眼频率约 15-20 次/分钟，但盯屏幕时降至 5-7 次，泪液蒸发加剧导致干眼。每次完整眨眼会挤压睑板腺，分泌一层脂质覆盖泪膜，延缓蒸发。"
caution = "结膜炎/角膜炎急性期不要用力眨眼，避免摩擦。"
variants = [
  "结合『睑板腺按摩』：用温暖手指轻揉眼睑边缘",
  "干眼严重者可在医生指导下使用人工泪液配合此训练",
]

[[tip]]
category = "eyes"
title = "屏幕与环境光匹配"
duration_secs = 0
frequency = "工作时长期保持"
steps = [
  "把屏幕亮度调到与周围环境亮度接近（用一张白纸对比，色调相近即可）",
  "白天工作开窗或开柔光顶灯，避免在暗环境用高亮屏",
  "屏幕距离眼睛 50-70 厘米（约一臂距离）",
  "屏幕顶部与水平视线齐平或略低，中心点低于视线 10-15 度",
  "笔记本用户考虑外接显示器或加屏幕支架",
  "开启系统的『深色模式』，长时间阅读用 60% 亮度足够",
  "夜间启用『色温调节』（Night Light / Night Shift / f.lux）",
]
benefit = "降低对比度差异，从根源减少视疲劳和头痛"
science = "瞳孔会根据视野中最亮区域自动调节大小。如果屏幕远比环境亮，瞳孔反复收缩-舒张会引起虹膜疲劳。环境光匹配可让瞳孔保持稳定。色温过高（>5500K）会过度抑制褪黑素分泌。"
caution = "屏幕过暗反而会让眼睛费力辨认，建议根据自己感受，不舒服就调亮一点。"
variants = [
  "进阶：使用『偏光屏幕保护膜』减少眩光",
  "外接独立『屏幕灯』（如 BenQ ScreenBar），不在屏幕上产生反光",
]

[[tip]]
category = "eyes"
title = "眼保健操（中国传统改良版）"
duration_secs = 240
frequency = "每天 1-2 次"
office_break = true
steps = [
  "用食指按揉攒竹穴（眉头内侧凹陷处）8 个 8 拍",
  "用拇指按睛明穴（内眼角与鼻梁之间）8 个 8 拍",
  "食指中指按四白穴（下眼眶中点直下 1 厘米）8 个 8 拍",
  "双手轻按太阳穴并向后揉 8 个 8 拍",
  "双手指腹刮眼眶一周（从睛明→鱼尾→眼眶下→回到睛明）8 次",
  "搓热双手做一次棕榈式收尾",
  "全程动作要轻，绝不可压迫眼球",
]
benefit = "刺激眼周经络与穴位，缓解眼周肌肉紧张，改善视疲劳"
science = "中医认为这些穴位与肝经、胃经相通，按压可改善气血循环。从现代医学看，眼周肌肉按摩可使局部血流量增加约 20-30%，缓解肌肉紧张性头痛。"
caution = "手要先洗净，避免感染。眼部有伤口、青光眼、视网膜疾病患者不宜按摩。"
variants = [
  "加上耳穴按压：揉搓耳垂上的『目穴』",
  "结合呼吸：每次按压时配合一次缓慢深呼吸",
]

# ═════════════════════════════ 🦴 颈椎与肩 (neck) ═════════════════════════════

[[tip]]
category = "neck"
title = "颈部四向缓慢伸展"
duration_secs = 120
frequency = "每 1 小时一组"
office_break = true
steps = [
  "坐直，肩膀放松向下沉，不要耸肩",
  "下巴缓慢贴胸口（拉伸颈后），保持 15 秒",
  "缓慢仰头，下巴指天花板（拉伸颈前），保持 15 秒",
  "头部缓慢右倒，右耳朝右肩，可用右手轻拉头部加深拉伸",
  "保持 15 秒，过程中左肩主动下沉",
  "换边重复",
  "全部动作配合呼吸：拉伸时呼气，回正时吸气",
  "每组完成后做 2-3 次完整呼吸再继续工作",
]
benefit = "拉伸斜方肌、胸锁乳突肌、提肩胛肌，缓解久坐导致的颈部僵硬"
science = "久坐时颈部肌肉长期处于等长收缩（不动但持续发力），代谢废物堆积引发僵硬和疼痛。拉伸可让肌肉血液循环增加 3-5 倍，加速废物排出。每天累计 5 分钟拉伸即可让颈痛风险降低约 40%（《Spine》期刊 2018）。"
caution = "颈椎病急性期、椎动脉供血不足、近期颈部受伤者不要后仰；动作必须缓慢，杜绝快速转头。"
variants = [
  "进阶：拉伸时左手放右肩，固定肩部增加拉伸幅度",
  "动态版：颈部缓慢画半圆（左→前→右），但不要做完整旋转，避免压迫椎动脉",
]

[[tip]]
category = "neck"
title = "麦肯基颈椎后缩（双下巴）"
duration_secs = 90
frequency = "每 1-2 小时一组"
office_break = true
steps = [
  "坐直，眼睛平视前方（不抬头不低头）",
  "想象有根绳子从头顶把你向上拉",
  "下巴水平向后收（像挤出双下巴的动作）",
  "注意：不是低头，是把整个头部水平向后平移",
  "感受颈后部上端肌肉的拉伸和颈前部的轻微紧张",
  "保持 5 秒，缓慢放松回到原位",
  "重复 10 次",
  "每天累计做满 30-40 次效果显著",
]
benefit = "矫正头部前倾，重建颈椎自然曲度，缓解上交叉综合征"
science = "现代人长期低头看屏幕，头部重心前移导致『颈椎曲度变直』甚至反弓。每前移 2.5 厘米，颈椎承重增加约 4.5 公斤。麦肯基疗法是物理治疗中最成熟的颈椎自我矫正技术，有大量 RCT 临床证据支持。"
caution = "动作要纯水平移动，不要低头或仰头；颈椎间盘突出急性期请在专业指导下进行。"
variants = [
  "睡前躺平做：仰卧时头主动向枕头里『压』，效果更明显",
  "贴墙做：脚跟、臀、上背、后脑勺贴墙，做后缩动作时后脑勺更贴墙",
]

[[tip]]
category = "neck"
title = "肩部环绕（动态）"
duration_secs = 60
frequency = "每小时一组"
office_break = true
steps = [
  "站立或坐直，双手自然下垂",
  "肩关节为支点，向前向上画大圆 10 次（前→上→后→下）",
  "停顿 2 秒",
  "反方向向后画大圆 10 次（后→上→前→下）",
  "幅度尽量大，肩胛骨明显移动",
  "配合呼吸：抬肩时吸气，下放时呼气",
  "结束后双肩主动下沉，保持 5 秒",
]
benefit = "活动肩袖肌群、改善圆肩、激活斜方肌中下束"
science = "肩袖由 4 块小肌肉组成（冈上、冈下、肩胛下、小圆肌），是肩关节稳定的关键。久坐让它们处于失活状态，肩胛骨上回旋不足导致圆肩、肩胛弹响。规律环绕训练可改善肩胛节律。"
caution = "肩关节脱位史、肩袖损伤、肩周炎急性期者动作幅度要小，避免诱发疼痛。"
variants = [
  "升级版：双手举哑铃（1-2 kg）做",
  "T-Y-W 拉伸：分别做出 T、Y、W 三个字母姿势，拉伸不同肌群",
]

[[tip]]
category = "neck"
title = "胸前合掌后压（颈后部拉伸）"
duration_secs = 60
frequency = "每 1-2 小时一次"
