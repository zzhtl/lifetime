  "缓慢用手把头往胸口方向轻轻下压",
  "感受颈后部肌肉的深度拉伸",
  "保持 20 秒，期间正常呼吸",
  "慢慢松手，头回到中位",
  "重复 3 组，每组之间休息 10 秒",
  "最后一组可以加上颈部轻微左右倾斜，拉伸更全面",
